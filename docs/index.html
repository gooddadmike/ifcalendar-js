<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC — About</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="nav nav-bottom">
    <a href="desk-clock.html"><i data-lucide="clock"></i></a>
    <a href="index.html" class="active"><i data-lucide="home"></i></a>
    <a href="calendars.html"><i data-lucide="calendar-days"></i></a>
  </nav>

  <div class="info-page">
    <div id="readme">Loading…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // ── Kiosk mode ───────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    if (params.get('kiosk') === 'true') {
      document.querySelector('.nav').style.display = 'none';
      document.querySelector('.info-page').style.setProperty('padding-bottom', '1rem');
    }

    // ── Load README ──────────────────────────────────────────────────────────
    fetch('https://raw.githubusercontent.com/gooddadmike/ifc-js/main/README.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('readme').innerHTML = marked.parse(md);
      });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>

</body>
</html>
