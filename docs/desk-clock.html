<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC Desk Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="clock-page">
    <div class="clock-layout" id="clock-layout">
      <!-- IFC -->
      <div class="clock-date">
        <div class="date-line">
          <span class="label">IFC</span>
          <a class="value" id="ifc-date" href="calendars.html">Loading…</a>
        </div>
      </div>

      <!-- Clock -->
      <div class="clock-face">
        <h1 class="clock" id="clock">00:00</h1>
      </div>

      <!-- Gregorian -->
      <div class="clock-date">
        <div class="date-line">
          <span class="label">Gregorian</span>
          <a class="value" id="greg-date" href="calendars.html">Loading…</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav nav-bottom">
    <a href="desk-clock.html" class="active"><i data-lucide="clock"></i></a>
    <a href="index.html"><i data-lucide="home"></i></a>
    <a href="calendars.html"><i data-lucide="calendar-days"></i></a>
  </nav>

  <script type="module">
    /*
      IFC Library Import (Primary focus of this project)
      Primary:   jsDelivr CDN (dogfooding)
      Fallback:  ../dist/index.js (same-origin, works offline/standalone)
    */

    let toIFC = null;
    let use24 = false;

    // Load IFC library - CDN first, local fallback if needed
    async function loadLibrary() {
      try {
        const module = await import("https://cdn.jsdelivr.net/npm/ifcalendar-js/dist/index.js");
        toIFC = module.toIFC;
        console.log("✅ ifcalendar-js loaded from jsDelivr CDN");
        updateDates();
        return;
      } catch (err) {
        console.warn("CDN failed, falling back to local ../dist/index.js");
      }

      try {
        const module = await import("../dist/index.js");
        toIFC = module.toIFC;
        console.log("✅ ifcalendar-js loaded from local ../dist/index.js");
        updateDates();
      } catch (fallbackErr) {
        console.error("❌ Failed to load ifcalendar-js from both sources", fallbackErr);
        document.getElementById('ifc-date').textContent = "IFC unavailable";
      }
    }

    // ── Update Dates ─────────────────────────────────────────────────────
    function updateDates() {
      const now = new Date();

      // Gregorian (right side)
      const gwd = now.toLocaleDateString('en-US', { weekday: 'short' });
      const gmo = now.toLocaleDateString('en-US', { month: 'short' });
      document.getElementById('greg-date').textContent = 
        `${gwd} ${gmo} ${now.getDate()}`;

      // IFC (left side) - short format
      if (toIFC) {
        document.getElementById('ifc-date').textContent = toIFC(now, 'short');
      }
    }

    // ── Update Clock ─────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';

      if (!use24) {
        h = h % 12 || 12;
        document.getElementById('clock').innerHTML = 
          `${h}:${m}<sup class="ampm">${ampm}</sup>`;
      } else {
        document.getElementById('clock').textContent = 
          `${String(h).padStart(2, '0')}:${m}`;
      }
    }

    // ── Main Update ──────────────────────────────────────────────────────
    function update() {
      updateClock();
      updateDates();
    }

    // 12/24 hour toggle
    document.getElementById('clock').addEventListener('click', () => {
      use24 = !use24;
      updateClock();
    });

    // ── Initialization ───────────────────────────────────────────────────
    setInterval(update, 60000);
    update();           // initial clock + dates
    loadLibrary();      // async load IFC library

    // ── Orientation Detection ────────────────────────────────────────────
    const layout = document.getElementById('clock-layout');
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      const portrait = height > width;
      layout.classList.toggle('layout-portrait', portrait);
      layout.classList.toggle('layout-landscape', !portrait);
    });
    ro.observe(document.body);

    // ── Standalone / Kiosk Mode ──────────────────────────────────────────
    const nav = document.querySelector('.nav');
    const isStandalone = 
      window.navigator.standalone === true ||
      window.matchMedia('(display-mode: standalone)').matches ||
      new URLSearchParams(window.location.search).get('kiosk') === 'true';

    if (isStandalone) {
      nav.style.display = 'none';
      document.querySelector('.clock-page').style.setProperty('padding-bottom', '0');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
