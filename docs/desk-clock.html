<!--
  ifcalendar-js — MIT — https://github.com/gooddadmike/ifcalendar-js
  Final - Respect system 12h/24h + native Intl formatting
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IFC Desk Clock</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%95%92%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock-page">
    <div class="clock-layout" id="clock-layout">
      <div class="clock-date">
        <div class="date-line">
          <span class="label">IFC</span>
          <a class="value" id="ifc-date" href="calendars.html">Loading…</a>
        </div>
      </div>

      <div class="clock-face">
        <h1 class="clock" id="clock">00:00</h1>
      </div>

      <div class="clock-date">
        <div class="date-line">
          <span class="label">Gregorian</span>
          <a class="value" id="greg-date" href="calendars.html">Loading…</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { toIFC } from "./index.js";

    // Reliable detection of user's actual 12h/24h preference
    const testTime = new Date(2025, 0, 1, 14, 0); // 2 PM

    const defaultFormat = new Intl.DateTimeFormat(undefined, { 
      hour: 'numeric' 
    }).format(testTime);

    let use24 = defaultFormat.includes('14');

    function updateDates() {
      const now = new Date();
      const rich = toIFC(now, 'object');

      document.getElementById('ifc-date').textContent = rich.short;
      document.getElementById('greg-date').textContent = rich.gregorian.short;
    }

    function updateClock() {
      const now = new Date();

      if (use24) {
        // 24h format using Intl (matches system)
        const formatter = new Intl.DateTimeFormat(undefined, {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        });
        document.getElementById('clock').textContent = formatter.format(now);
      } else {
        // 12h format with AM/PM
        const formatter = new Intl.DateTimeFormat(undefined, {
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        });
        const formatted = formatter.format(now);
        document.getElementById('clock').innerHTML = formatted.replace(' ', '<sup class="ampm">') + '</sup>';
      }
    }

    function update() {
      updateClock();
      updateDates();
    }

    // Tap the big clock to toggle
    document.getElementById('clock').addEventListener('click', () => {
      use24 = !use24;
      updateClock();
    });

    setInterval(update, 60000);
    update();

    // Orientation detection
    const layout = document.getElementById('clock-layout');
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      const portrait = height > width;
      layout.classList.toggle('layout-portrait', portrait);
      layout.classList.toggle('layout-landscape', !portrait);
    });
    ro.observe(document.body);
  </script>

</body>
</html>
