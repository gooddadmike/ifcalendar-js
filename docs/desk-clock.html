<!--
  ifcalendar-js — MIT — https://github.com/gooddadmike/ifcalendar-js
  12h default + toggle + preserves mode when navigating to/from calendars
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IFC Desk Clock</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%95%92%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock-page">
    <div class="clock-layout" id="clock-layout">
      <div class="clock-date">
        <div class="date-line">
          <span class="label">IFC</span>
          <a class="value" id="ifc-date" href="calendars.html">Loading…</a>
        </div>
      </div>

      <div class="clock-face">
        <h1 class="clock" id="clock">00:00</h1>
      </div>

      <div class="clock-date">
        <div class="date-line">
          <span class="label">Gregorian</span>
          <a class="value" id="greg-date" href="calendars.html">Loading…</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { toIFC } from "./index.js";

    // Read incoming mode from URL (so returning from calendars keeps the mode)
    const params = new URLSearchParams(window.location.search);
    let use24 = params.get('use24') === 'true';

    // If no param, default to 12h (regional preference)
    if (!params.has('use24')) {
      use24 = false;
    }

    function updateDates() {
      const now = new Date();
      const rich = toIFC(now, 'object');

      document.getElementById('ifc-date').textContent = rich.short;

      // Trim year from Gregorian short date
      let gregShort = rich.gregorian.short;
      gregShort = gregShort.replace(/\s*\d{4}\s*$/, '');
      document.getElementById('greg-date').textContent = gregShort;

      // Update links with current mode
      const param = use24 ? "?use24=true" : "";
      document.getElementById('ifc-date').href = "calendars.html" + param;
      document.getElementById('greg-date').href = "calendars.html" + param;
    }

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');

      if (use24) {
        const h = String(hours).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${minutes}`;
      } else {
        const h = hours % 12 || 12;
        const ampm = hours >= 12 ? 'PM' : 'AM';
        document.getElementById('clock').innerHTML = `${h}:${minutes}<sup class="ampm">${ampm}</sup>`;
      }
    }

    function update() {
      updateClock();
      updateDates();
    }

    // Tap big clock to toggle mode and refresh links
    document.getElementById('clock').addEventListener('click', () => {
      use24 = !use24;
      updateClock();
      updateDates();
    });

    setInterval(update, 60000);
    update();

    // Orientation detection
    const layout = document.getElementById('clock-layout');
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      const portrait = height > width;
      layout.classList.toggle('layout-portrait', portrait);
      layout.classList.toggle('layout-landscape', !portrait);
    });
    ro.observe(document.body);
  </script>

</body>
</html>
