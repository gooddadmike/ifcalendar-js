<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IFC Desk Clock</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%95%92%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock-page">
    <div class="clock-layout" id="clock-layout">
      <div class="clock-date">
        <div class="date-line">
          <span class="label">IFC</span>
          <a class="value" id="ifc-date" href="calendars.html">Loading…</a>
        </div>
      </div>

      <div class="clock-face">
        <h1 class="clock" id="clock">00:00</h1>
      </div>

      <div class="clock-date">
        <div class="date-line">
          <span class="label">Gregorian</span>
          <a class="value" id="greg-date" href="calendars.html">Loading…</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { toIFC } from "./index.js";

    console.log("=== Desk Clock Take #6 - Improved 24h detection ===");

    // Improved detection - prioritize the 14:00 test
    const test14 = new Intl.DateTimeFormat(navigator.language, { 
      hour: 'numeric', 
      hour12: false 
    }).format(new Date(2025, 0, 1, 14, 0));

    console.log("System language:", navigator.language);
    console.log("14:00 formatted as:", test14);

    let use24 = test14.includes('14') || test14.length >= 2 && !test14.includes('AM') && !test14.includes('PM');

    console.log("Final detected use24 =", use24);

    function updateDates() {
      const now = new Date();
      const rich = toIFC(now, 'object');

      document.getElementById('ifc-date').textContent = rich.short;
      document.getElementById('greg-date').textContent = rich.gregorian.short;
    }

    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');

      if (use24) {
        document.getElementById('clock').textContent = `${String(h).padStart(2, '0')}:${m}`;
      } else {
        h = h % 12 || 12;
        document.getElementById('clock').innerHTML = 
          `${h}:${m}<sup class="ampm">${now.getHours() >= 12 ? 'PM' : 'AM'}</sup>`;
      }
    }

    function update() {
      updateClock();
      updateDates();
    }

    // Tap the big clock to toggle
    document.getElementById('clock').addEventListener('click', () => {
      use24 = !use24;
      console.log("Toggled use24 to:", use24);
      updateClock();
    });

    // Initial update
    console.log("Running initial update with use24 =", use24);
    update();

    setInterval(update, 60000);

    // Orientation detection
    const layout = document.getElementById('clock-layout');
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      const portrait = height > width;
      layout.classList.toggle('layout-portrait', portrait);
      layout.classList.toggle('layout-landscape', !portrait);
    });
    ro.observe(document.body);
  </script>

</body>
</html>
