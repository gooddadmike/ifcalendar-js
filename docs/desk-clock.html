  </div>

  <div id="diag"></div>

  <script type="module">
    import { toIFC } from "./index.js";

    // Diagnostics
    const testTime = new Date();
    testTime.setHours(14, 0, 0, 0);

    const fmtUndefined = new Intl.DateTimeFormat(undefined,          { hour: 'numeric' });
    const fmtNavLang   = new Intl.DateTimeFormat(navigator.language,  { hour: 'numeric' });

    const hourCycle = fmtUndefined.resolvedOptions().hourCycle;
    let use24 = hourCycle === 'h23' || hourCycle === 'h24';

    const diagLines = [
      `navigator.language:   ${navigator.language}`,
      `navigator.languages:  ${navigator.languages.join(', ')}`,
      `undefined formatted:  ${fmtUndefined.format(testTime)}`,
      `undefined hourCycle:  ${hourCycle}`,
      `undefined locale:     ${fmtUndefined.resolvedOptions().locale}`,
      `navLang formatted:    ${fmtNavLang.format(testTime)}`,
      `navLang hourCycle:    ${fmtNavLang.resolvedOptions().hourCycle}`,
      `use24 detected as:    ${use24}`,
    ];

    document.getElementById('diag').innerHTML = diagLines.join('<br>');

    function updateDates() {
      const now = new Date();
      const rich = toIFC(now, 'object');
      document.getElementById('ifc-date').textContent = rich.short;
      document.getElementById('greg-date').textContent = rich.gregorian.short;
    }

    function updateClock() {
      const now = new Date();
      const m = String(now.getMinutes()).padStart(2, '0');

      if (use24) {
        const h = String(now.getHours()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${m}`;
      } else {
        const h = now.getHours() % 12 || 12;
        const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
        document.getElementById('clock').innerHTML =
          `${h}:${m}<sup class="ampm">${ampm}</sup>`;
      }
    }

    function update() {
      updateClock();
      updateDates();
    }

    // Tap the clock face to toggle 12h/24h
    document.getElementById('clock').addEventListener('click', () => {
      use24 = !use24;
      updateClock();
    });

    setInterval(update, 60000);
    update();

    // Orientation / layout detection
    const layout = document.getElementById('clock-layout');
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      const portrait = height > width;
      layout.classList.toggle('layout-portrait', portrait);
      layout.classList.toggle('layout-landscape', !portrait);
    });
    ro.observe(document.body);
  </script>

</body>
