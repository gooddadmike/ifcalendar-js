  </div>

  <script type="module">
    import { toIFC } from "./index.js";

    // --- DIAGNOSTIC: open Safari console to read these values ---
    const testTime = new Date();
    testTime.setHours(14, 0, 0, 0);

    const fmtUndefined   = new Intl.DateTimeFormat(undefined,          { hour: 'numeric' });
    const fmtNavLang     = new Intl.DateTimeFormat(navigator.language,  { hour: 'numeric' });
    const fmtNavLangH23  = new Intl.DateTimeFormat(navigator.language,  { hour: 'numeric', hourCycle: 'h23' });

    console.log('--- IFC Clock Diagnostics ---');
    console.log('navigator.language:          ', navigator.language);
    console.log('navigator.languages:         ', navigator.languages);
    console.log('undefined locale formatted:  ', fmtUndefined.format(testTime));
    console.log('undefined hourCycle:         ', fmtUndefined.resolvedOptions().hourCycle);
    console.log('undefined locale:            ', fmtUndefined.resolvedOptions().locale);
    console.log('navLang formatted:           ', fmtNavLang.format(testTime));
    console.log('navLang hourCycle:           ', fmtNavLang.resolvedOptions().hourCycle);
    console.log('navLang h23 formatted:       ', fmtNavLangH23.format(testTime));
    console.log('-----------------------------');

    // Current best-guess detection — may be wrong on iPadOS (that's what we're testing)
    const hourCycle = fmtUndefined.resolvedOptions().hourCycle;
    let use24 = hourCycle === 'h23' || hourCycle === 'h24';
    console.log('use24 detected as:           ', use24);
    console.log('-----------------------------');

    function updateDates() {
      const now = new Date();
      const rich = toIFC(now, 'object');
      document.getElementById('ifc-date').textContent = rich.short;
      document.getElementById('greg-date').textContent = rich.gregorian.short;
    }

    function updateClock() {
      const now = new Date();
      const m = String(now.getMinutes()).padStart(2, '0');

      if (use24) {
        const h = String(now.getHours()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${m}`;
      } else {
        const h = now.getHours() % 12 || 12;
        const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
        document.getElementById('clock').innerHTML =
          `${h}:${m}<sup class="ampm">${ampm}</sup>`;
      }
    }

    function update() {
      updateClock();
      updateDates();
    }

    // Tap the clock face to toggle 12h/24h
    document.getElementById('clock').addEventListener('click', () => {
      use24 = !use24;
      updateClock();
    });

    setInterval(update, 60000);
    update();

    // Orientation / layout detection
    const layout = document.getElementById('clock-layout');
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      const portrait = height > width;
      layout.classList.toggle('layout-portrait', portrait);
      layout.classList.toggle('layout-landscape', !portrait);
    });
    ro.observe(document.body);
  </script>

</body>
