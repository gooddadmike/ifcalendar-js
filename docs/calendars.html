<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC Calendars</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calendars-page">
    <!-- Time and conversion on the SAME line -->
    <div class="top-bar">
      <a href="desk-clock.html" id="time-link" class="current-time">00:00</a>
      <div class="conversion-display" id="conversion">Click any date</div>
    </div>

    <div class="calendars" id="calendars">

      <div class="cal">
        <h2>International Fixed</h2>
        <div class="cal-nav">
          <button id="iPrev">‹</button>
          <select id="iMonth"></select>
          <input type="number" id="iYear" min="1900" max="2100">
          <button id="iNext">›</button>
        </div>
        <div class="weekdays" id="iWeekdays"></div>
        <div class="days" id="iDays"></div>
      </div>

      <div class="cal">
        <h2>Gregorian</h2>
        <div class="cal-nav">
          <button id="gPrev">‹</button>
          <select id="gMonth"></select>
          <input type="number" id="gYear" min="1900" max="2100">
          <button id="gNext">›</button>
        </div>
        <div class="weekdays" id="gWeekdays"></div>
        <div class="days" id="gDays"></div>
      </div>

    </div>
  </div>

  <script type="module">
    let toIFC, toGregorian, isLeap, currentLocale;

    async function loadLibrary() {
      try {
        const module = await import("https://cdn.jsdelivr.net/npm/ifcalendar-js/dist/index.js");
        toIFC = module.toIFC;
        toGregorian = module.toGregorian;
        isLeap = module.isLeap;
        currentLocale = module.EN;
        console.log("✅ ifcalendar-js loaded from jsDelivr CDN");
        init();
        return;
      } catch (err) {
        console.warn("CDN failed, falling back to local ./index.js");
      }

      try {
        const module = await import("./index.js");
        toIFC = module.toIFC;
        toGregorian = module.toGregorian;
        isLeap = module.isLeap;
        currentLocale = module.EN;
        console.log("✅ ifcalendar-js loaded from local ./index.js");
        init();
      } catch (fallbackErr) {
        console.error("❌ Failed to load ifcalendar-js", fallbackErr);
        document.getElementById('conversion').textContent = "Library failed to load";
      }
    }

    let selISO = null;   // Stores IFC string (IFC-first)

    let iView = {};
    let gView = {};

    function getTodayISO() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }

    function init() {
      const todayGreg = getTodayISO();
      const rich = toIFC(todayGreg, 'object');
      selISO = rich.ifcISO;                    // Store as IFC string
      iView = { year: rich.year, month: rich.month };
      gView = { year: rich.gregorian.year, month: rich.gregorian.month - 1 };

      buildDropdowns();
      buildWeekdays();
      render();
      startLiveClock();
    }

    function startLiveClock() {
      const timeLink = document.getElementById('time-link');
      setInterval(() => {
        const now = new Date();
        let h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        timeLink.textContent = `${h}:${m}`;
      }, 1000);
    }

    function ifcMonthDays(m, year) {
      if (m === 6 && isLeap(year)) return 29;
      if (m === 13) return 29;
      return 28;
    }

    function setGridRows(gridEl) {
      gridEl.style.gridTemplateRows = 'repeat(5, 1fr)';
    }

    function formatConversion() {
      if (!toIFC || !selISO) return "Click any date";
      const rich = toIFC(toGregorian(selISO), 'object');
      const g = rich.gregorian;
      return `${rich.short}  ↔  ${g.short}`;
    }

    function buildIfcGrid() {
      if (!toIFC) return;
      const { year, month } = iView;
      const grid = document.getElementById('iDays');
      grid.innerHTML = '';
      const maxDay = ifcMonthDays(month, year);

      for (let d = 1; d <= maxDay; d++) {
        const isoStr = `IFC:${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const el = document.createElement('div');

        if (d === 29) {
          el.className = 'day special';
          el.textContent = month === 6 ? '✦ Leap Day' : '✦ Year Day';
        } else {
          el.className = 'day';
          el.textContent = d;
        }

        if (isoStr === selISO) el.classList.add('selected');
        if (isoStr === toIFC(null, 'object').ifcISO) el.classList.add('today');

        el.addEventListener('click', () => selectDate(isoStr));
        grid.appendChild(el);
      }

      setGridRows(grid);
    }

    function buildGregGrid() {
      const { year, month } = gView;
      const grid = document.getElementById('gDays');
      grid.innerHTML = '';

      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'day empty';
        grid.appendChild(el);
      }

      for (let d = 1; d <= lastDay; d++) {
        const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const el = document.createElement('div');
        el.className = 'day';
        el.textContent = d;
        if (iso === toGregorian(selISO)) el.classList.add('selected');
        if (iso === getTodayISO()) el.classList.add('today');
        el.addEventListener('click', () => selectDate(iso));
        grid.appendChild(el);
      }

      const totalCells = firstDay + lastDay;
      const rows = Math.ceil(totalCells / 7);
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    function buildWeekdays() {
      const wdHTML = currentLocale.weekdaysShort.map(w => `<span>${w}</span>`).join('');
      document.getElementById('gWeekdays').innerHTML = wdHTML;
      document.getElementById('iWeekdays').innerHTML = wdHTML;
    }

    function buildDropdowns() {
      const gSel = document.getElementById('gMonth');
      const iSel = document.getElementById('iMonth');

      currentLocale.gregMonths.forEach((m, i) => {
        gSel.innerHTML += `<option value="${i}">${m}</option>`;
      });

      currentLocale.ifcMonths.forEach((m, i) => {
        iSel.innerHTML += `<option value="${i+1}">${m}</option>`;
      });
    }

    function syncControls() {
      document.getElementById('gMonth').value = gView.month;
      document.getElementById('gYear').value = gView.year;
      document.getElementById('iMonth').value = iView.month;
      document.getElementById('iYear').value = iView.year;
    }

    function render() {
      if (!toIFC) return;
      syncControls();
      buildIfcGrid();
      buildGregGrid();
      document.getElementById('conversion').textContent = formatConversion();
    }

    function selectDate(iso) {
      if (iso.startsWith('IFC:')) {
        selISO = iso;                    // Store IFC string directly
      } else {
        // Gregorian click → convert to IFC string
        const rich = toIFC(iso, 'object');
        selISO = rich.ifcISO;
      }

      const rich = toIFC(toGregorian(selISO), 'object');
      iView = { year: rich.year, month: rich.month };
      gView = { year: rich.gregorian.year, month: rich.gregorian.month - 1 };
      render();
    }

    // Nav handlers
    document.getElementById('iPrev').addEventListener('click', () => {
      if (iView.month === 1) { iView.month = 13; iView.year--; }
      else iView.month--;
      render();
    });

    document.getElementById('iNext').addEventListener('click', () => {
      if (iView.month === 13) { iView.month = 1; iView.year++; }
      else iView.month++;
      render();
    });

    document.getElementById('gPrev').addEventListener('click', () => {
      if (gView.month === 0) { gView.month = 11; gView.year--; }
      else gView.month--;
      render();
    });

    document.getElementById('gNext').addEventListener('click', () => {
      if (gView.month === 11) { gView.month = 0; gView.year++; }
      else gView.month++;
      render();
    });

    document.getElementById('iMonth').addEventListener('change', e => {
      iView.month = parseInt(e.target.value);
      render();
    });

    document.getElementById('iYear').addEventListener('change', e => {
      iView.year = parseInt(e.target.value);
      render();
    });

    document.getElementById('gMonth').addEventListener('change', e => {
      gView.month = parseInt(e.target.value);
      render();
    });

    document.getElementById('gYear').addEventListener('change', e => {
      gView.year = parseInt(e.target.value);
      render();
    });

    // Start
    loadLibrary();
  </script>

</body>
</html>
