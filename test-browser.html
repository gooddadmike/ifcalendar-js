<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifcalendar-js — Test & Demo</title>
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 40px; 
      line-height: 1.6; 
      background: #f9f9f9;
    }
    h1 { color: #222; }
    table { 
      border-collapse: collapse; 
      width: 100%; 
      max-width: 1100px; 
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td { 
      padding: 12px 10px; 
      border: 1px solid #ddd; 
      text-align: left;
    }
    th { 
      background: #f0f0f0; 
      font-weight: 600;
    }
    .highlight { background: #fff3cd; }
    code { 
      font-family: monospace; 
      background: #f4f4f4; 
      padding: 2px 6px; 
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>ifcalendar-js — Test & Demo</h1>
  <p>This page loads the library directly from <strong>jsDelivr CDN</strong> and tests various conversions and edge cases.</p>

  <table>
    <thead>
      <tr>
        <th>Test Case</th>
        <th>Input</th>
        <th>Short Format</th>
        <th>Long Format</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script type="module">
    import { toIFC, toGregorian } from "https://cdn.jsdelivr.net/npm/ifcalendar-js/dist/index.js";

    const tests = [
      { name: "Today",                     input: null,                    type: "toIFC" },
      { name: "Normal Date",               input: "2026-03-25",            type: "toIFC" },
      { name: "Leap Day (Greg → IFC)",     input: "2024-06-17",            type: "toIFC" },
      { name: "Year Day (Greg → IFC)",     input: "2024-12-31",            type: "toIFC" },
      { name: "Sol Month",                 input: "2026-07-15",            type: "toIFC" },
      { name: "Post-Leap Day (July)",      input: "2024-08-01",            type: "toIFC" },

      { name: "IFC → Gregorian",           input: "IFC:2026-03-25",        type: "toGreg" },
      { name: "Leap Day (IFC → Greg)",     input: "IFC:2024-06-29",        type: "toGreg" },
      { name: "Year Day (IFC → Greg)",     input: "IFC:2024-13-29",        type: "toGreg" },
      { name: "July (should not show Sol)",input: "IFC:2024-08-01",        type: "toGreg" },
      { name: "Invalid Month",             input: "IFC:2024-14-01",        type: "toGreg" }
    ];

    const tbody = document.getElementById('tableBody');

    tests.forEach(test => {
      let short = '', long = '';

      try {
        if (test.type === "toIFC") {
          short = toIFC(test.input, 'short');
          long  = toIFC(test.input, 'long');
        } else {
          short = toGregorian(test.input, 'short');
          long  = toGregorian(test.input, 'long');
        }
      } catch (e) {
        short = long = `Error: ${e.message}`;
      }

      const row = document.createElement('tr');
      if (test.name.includes("Leap Day") || test.name.includes("Year Day")) {
        row.classList.add('highlight');
      }

      row.innerHTML = `
        <td><strong>${test.name}</strong></td>
        <td><code>${test.input || 'today'}</code></td>
        <td>${short}</td>
        <td>${long}</td>
      `;
      tbody.appendChild(row);
    });
  </script>
</body>
</html>
